include theme.conf

font_family      family='FiraCode Nerd Font Mono' style=Regular
bold_font        family='FiraCode Nerd Font Mono' style=Bold
italic_font      family='FiraCode Nerd Font Mono' style=Retina
bold_italic_font family='FiraCode Nerd Font Mono' style=SemiBold

disable_ligatures never
background_opacity 0.75

tab_bar_edge top
tab_bar_style separator
tab_separator "   "
tab_activity_symbol "󰌽 "
tab_bar_align center
tab_bar_min_tabs 3
tab_title_template "{activity_symbol}{title}"
active_tab_font_style   bold
inactive_tab_font_style normal

window_margin_width 0 1
enabled_layouts tall, *
hide_window_decorations yes

scrollback_lines 200
focus_follows_mouse yes
confirm_os_window_close 0
shell_integration no-cursor

cursor_shape underline
cursor_shape_unfocused unchanged
cursor_underline_thickness 0.5
cursor_blink_interval 0
